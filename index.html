<!doctype html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <title>Design For a Better World</title>

  <style>

    body { background-color: blue;
            color: orange;  }

    p { font-weight: bold;
        font-size: 400px;
        margin: -80px 55px -80px 55px; }

    div { font-size: 150px;
          margin: 90px 20px 90px 55px; }

    h1 { font-weight: bold;
        font-size: 300px;
        margin: 100px 20px 90px 55px;
        letter-spacing: 50px;   }

    .offset span {
        display: inline-block;
		transform: rotate(-15deg); }
    
  </style>

</head>


<body>
  <p style="letter-spacing: 30px;">DE-</p>
  <p style="letter-spacing: 30px;"
	  class="offset">SI<span>G</span>N</p>
  <div style="margin-left: 800px;">for</div>
  <p>A BET-</p>
  <p style="margin-left: 420px;">TER</p>
  <h1>WORLD</h1>  
</body>
